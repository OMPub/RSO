<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-labelledby="title desc">
  <title id="title">Orbital Witness RSO Archive</title>
  <desc id="desc">Social preview image for the Orbital Witness RSO archive repository.</desc>
  <defs>
    <radialGradient id="bg" cx="40%" cy="38%" r="82%">
      <stop offset="0%" stop-color="#172b3d"/>
      <stop offset="58%" stop-color="#07111a"/>
      <stop offset="100%" stop-color="#020407"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      text{letter-spacing:0}
      .mono{font-family:Menlo,Consolas,monospace}
      .sans{font-family:Inter,Arial,sans-serif}
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="#000" opacity=".18"/>

  <g opacity=".22">
    <circle cx="170" cy="95" r="1.2" fill="#dcecff"/>
    <circle cx="320" cy="505" r="1.4" fill="#dcecff"/>
    <circle cx="455" cy="142" r="1.1" fill="#dcecff"/>
    <circle cx="742" cy="82" r="1.3" fill="#dcecff"/>
    <circle cx="901" cy="510" r="1.1" fill="#dcecff"/>
    <circle cx="1115" cy="130" r="1.5" fill="#dcecff"/>
    <circle cx="1195" cy="410" r="1.2" fill="#dcecff"/>
  </g>

  <g transform="translate(812 82)" filter="url(#glow)">
    <image href="orbital-witness-icon.png" x="0" y="0" width="430" height="430" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g fill="none" stroke-linecap="round" opacity=".75">
    <ellipse cx="1027" cy="297" rx="292" ry="64" stroke="#4fd8ff" stroke-width="2" transform="rotate(18 1027 297)"/>
    <ellipse cx="1027" cy="297" rx="292" ry="64" stroke="#8fa3ae" stroke-width="1.5" transform="rotate(-18 1027 297)"/>
  </g>

  <text x="76" y="146" class="mono" font-size="34" font-weight="800" fill="#4fd8ff">ORBITAL WITNESS</text>
  <text x="76" y="236" class="mono" font-size="78" font-weight="900" fill="#f4fbff">RSO ARCHIVE</text>
  <text x="82" y="296" class="sans" font-size="29" font-weight="700" fill="#c9d9e2">Daily public snapshots of the space object catalog</text>

  <g transform="translate(82 378)">
    <rect x="0" y="0" width="648" height="96" rx="8" fill="#08141e" opacity=".86" stroke="#284153" stroke-width="2"/>
    <text x="28" y="38" class="mono" font-size="20" font-weight="800" fill="#8fa3ae">HASHED  •  ARCHIVED  •  WITNESSED</text>
    <text x="28" y="72" class="mono" font-size="22" font-weight="800" fill="#ffd166">om.pub / OMPub / RSO</text>
  </g>

  <g transform="translate(82 532)" class="mono" font-size="18" font-weight="800">
    <rect x="0" y="-15" width="22" height="14" rx="2" fill="#4fd8ff"/>
    <text x="34" y="0" fill="#dce8ef">PAYLOAD</text>
    <rect x="166" y="-15" width="22" height="14" rx="2" fill="#8b98a1"/>
    <text x="200" y="0" fill="#dce8ef">DEBRIS</text>
    <rect x="324" y="-15" width="22" height="14" rx="2" fill="#ffd166"/>
    <text x="358" y="0" fill="#dce8ef">ROCKET BODY</text>
    <rect x="558" y="-15" width="22" height="14" rx="2" fill="#ff5ea8"/>
    <text x="592" y="0" fill="#dce8ef">UNKNOWN</text>
  </g>
</svg>
