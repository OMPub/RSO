<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-labelledby="title desc">
  <title id="title">Orbital Witness RSO Archive</title>
  <desc id="desc">A bold social preview for the Orbital Witness RSO archive repository.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="78%">
      <stop offset="0%" stop-color="#152737"/>
      <stop offset="58%" stop-color="#071019"/>
      <stop offset="100%" stop-color="#010306"/>
    </radialGradient>
    <filter id="softGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      text{letter-spacing:0}
      .mono{font-family:Menlo,Consolas,monospace}
      .sans{font-family:Inter,Arial,sans-serif}
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="#000" opacity=".24"/>

  <g fill="none" stroke-linecap="round">
    <ellipse cx="840" cy="324" rx="500" ry="104" stroke="#4fd8ff" stroke-width="2.5" opacity=".36" transform="rotate(20 840 324)"/>
    <ellipse cx="840" cy="324" rx="500" ry="104" stroke="#dce8ef" stroke-width="1.5" opacity=".18" transform="rotate(-20 840 324)"/>
  </g>

  <g opacity=".34">
    <circle cx="102" cy="104" r="2" fill="#dcecff"/>
    <circle cx="208" cy="520" r="1.7" fill="#dcecff"/>
    <circle cx="568" cy="92" r="2.1" fill="#dcecff"/>
    <circle cx="946" cy="122" r="1.8" fill="#dcecff"/>
    <circle cx="1156" cy="482" r="2.2" fill="#dcecff"/>
  </g>

  <g transform="translate(736 72)" filter="url(#softGlow)">
    <image href="orbital-witness-icon.png" x="0" y="0" width="520" height="520" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g transform="translate(80 176)">
    <text x="0" y="0" class="mono" font-size="42" font-weight="900" fill="#4fd8ff">ORBITAL</text>
    <text x="0" y="72" class="mono" font-size="42" font-weight="900" fill="#4fd8ff">WITNESS</text>
    <text x="0" y="184" class="mono" font-size="92" font-weight="900" fill="#f5fbff">RSO</text>
    <text x="0" y="266" class="mono" font-size="64" font-weight="900" fill="#f5fbff">ARCHIVE</text>
    <rect x="0" y="304" width="590" height="4" rx="2" fill="#ffd166"/>
    <text x="0" y="356" class="sans" font-size="30" font-weight="800" fill="#c9d9e2">Decentralized space object archive, witnessed daily</text>
  </g>
</svg>
