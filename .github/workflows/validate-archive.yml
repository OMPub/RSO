name: Validate RSO Archive

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.3"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Check syntax
        run: python -m py_compile pipeline/snapshot.py

      - name: Validate archive artifacts
        run: python pipeline/snapshot.py validate
