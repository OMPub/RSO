name: Daily RSO Snapshot

on:
  schedule:
    # GitHub schedules are UTC and may start late. Keep the target close to
    # the midnight UTC cutoff while leaving a small buffer after the boundary.
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Snapshot date, YYYY-MM-DD. Defaults to current UTC date."
        required: false
        type: string
      mode:
        description: "Snapshot mode. Auto uses genesis only on the official baseline date."
        required: false
        default: auto
        type: choice
        options:
          - auto
          - daily
          - genesis
      force:
        description: "Overwrite an existing snapshot for the selected date."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      OFFICIAL_BASELINE_DATE: "2026-04-20"
      RSO_REQUEST_DELAY: "5"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.3"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Capture snapshot
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: |
          set -euo pipefail
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE="$(date -u +%F)"
          fi

          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            MODE="auto"
          fi

          if [ "$MODE" = "auto" ]; then
            if [ "$DATE" = "$OFFICIAL_BASELINE_DATE" ]; then
              COMMAND="genesis"
            else
              COMMAND="daily"
            fi
          else
            COMMAND="$MODE"
          fi

          args=(pipeline/snapshot.py "$COMMAND" --date "$DATE")
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            args+=(--force)
          fi
          python "${args[@]}"

      - name: Commit archive changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data ledger.json
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
            exit 0
          fi
          git commit -m "Archive RSO snapshot"
          git push
