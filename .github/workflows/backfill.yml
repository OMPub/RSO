name: Backfill RSO Archive

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Start date, YYYY-MM-DD"
        required: true
        type: string
      end:
        description: "End date, YYYY-MM-DD"
        required: true
        type: string

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      RSO_REQUEST_DELAY: "12.5"
      STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND || 'github_release' }}
      UPLOAD_POLICY: ${{ vars.UPLOAD_POLICY || 'if_missing' }}
      RSO_RETAINED_CATALOG_COUNT: "2"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.3"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Backfill snapshots
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: |
          set -euo pipefail
          args=(pipeline/snapshot.py backfill --start "${{ inputs.start }}" --end "${{ inputs.end }}")
          python "${args[@]}"

      - name: Validate captured archive
        run: |
          set -euo pipefail
          python pipeline/snapshot.py validate

      - name: Build release archives
        run: |
          set -euo pipefail
          python pipeline/snapshot.py publish --start "${{ inputs.start }}" --end "${{ inputs.end }}" --storage-backend none

      - name: Prune old catalogs from git archive
        run: |
          set -euo pipefail
          python pipeline/snapshot.py prune-catalogs --all --keep-latest "$RSO_RETAINED_CATALOG_COUNT" --require-bundle
          python pipeline/snapshot.py validate

      - name: Commit archive changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data ledger.json
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
            exit 0
          fi
          git commit -m "Backfill RSO archive"
          git push

      - name: Publish release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python pipeline/snapshot.py publish --start "${{ inputs.start }}" --end "${{ inputs.end }}" --use-existing-bundle
